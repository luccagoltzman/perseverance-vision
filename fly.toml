# Fly.io — apenas servidor multiplayer (não hospeda o PWA React).
# Deploy: fly deploy --config fly.toml
# O site completo fica na Vercel; aqui só roda WebSocket em /ws

app = "perseverance-vision"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile.mp"

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
