<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fff7f5" />
    <script>
      (function () {
        var t = localStorage.getItem('mars-theme');
        if (t === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
    <meta
      name="description"
      content="Centro de Comando — Telemetria e exploração visual de Marte com dados da NASA."
    />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Mars Telemetry — Centro de Comando</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
